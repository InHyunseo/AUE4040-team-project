# Central parameter file. Loaded by launch files and passed to nodes.

/**:
  ros__parameters:
    # ---- camera (stereo pair) ----
    camera:
      left_sensor_id: 0
      right_sensor_id: 1
      width: 1280
      height: 720
      display_width: 640
      display_height: 360
      fps: 30
      manual_exposure: true   # see PROJECT_PLAN §9.2

    # ---- stereo (rectify only — no disparity at runtime) ----
    stereo:
      calib_path: "config/stereo_calib.yaml"
      sync_slop_s: 0.03

    # ---- perception (YOLO) ----
    perception:
      engine_path: "models/yolov8n.engine"
      # input_size is read from the engine at load time (320 for our fine-tuned
      # 7-class model, 640 for the stock COCO smoke-test engine).
      conf_threshold: 0.4
      iou_threshold: 0.5
      detect_every_n: 2              # YOLO runs at half the camera rate
      stable_frames_sign: 4
      stable_frames_light: 4
      stable_frames_turn: 5
      class_names:
        - traffic_light_red
        - traffic_light_green
        - traffic_light_yellow
        - stop_sign
        - vehicle
        - turn_left_sign
        - turn_right_sign

    # ---- lane (center-regression) ----
    lane:
      input_size: 224
      models:
        common: "models/center_common.engine"
        left: "models/center_left.engine"
        right: "models/center_right.engine"
      smoothing_alpha: 0.7

    # ---- decision / FSM ----
    decision:
      mission: "left"     # left | right
      steering_gain_k: 1.2
      safe_dist_m: 0.4
      stop_wait_seconds: 3.0
      lane_lost_frames: 10
      # Bbox-height distance. K = bbox_h_px * d (px * m). Measure once with
      # scripts/calibrate_vehicle_distance.py and the actual vehicle.
      vehicle_dist_K: 180.0
      vehicle_dist_window_n: 5
      det_score_min: 0.4

    # ---- control ----
    control:
      target_speed: 0.35
      curvature_decel_factor: 0.6
      max_steer: 0.8
      max_speed: 0.5
