# Central parameter file. Loaded by launch files and passed to nodes.

/**:
  ros__parameters:
    # ---- camera (stereo pair) ----
    camera:
      left_sensor_id: 0
      right_sensor_id: 1
      width: 1280
      height: 720
      display_width: 640
      display_height: 360
      fps: 30
      manual_exposure: true   # see PROJECT_PLAN §9.2

    # ---- stereo (rectify + disparity) ----
    stereo:
      calib_path: "config/stereo_calib.yaml"
      baseline_m: 0.06          # tune from calibration result T vector
      sync_slop_s: 0.03
      num_disparities: 64
      block_size: 15

    # ---- perception (YOLO) ----
    perception:
      engine_path: "models/yolov8n.engine"
      input_size: 640
      conf_threshold: 0.4
      iou_threshold: 0.5
      stable_frames_sign: 4
      stable_frames_light: 4
      stable_frames_roundabout: 5
      roundabout_bbox_min_area: 1500   # px^2, tune in-situ

    # ---- pilotnet (center-regression) ----
    pilotnet:
      input_size: 224
      models:
        common: "models/center_common.engine"
        left: "models/center_left.engine"
        right: "models/center_right.engine"
      smoothing_alpha: 0.7

    # ---- decision / FSM ----
    decision:
      mission: "left"     # left | right
      steering_gain_k: 1.2
      safe_dist_m: 0.4
      stop_wait_seconds: 3.0
      lane_lost_frames: 10
      # Bbox-height fallback (used when stereo distance is inf / unavailable).
      # K = fx * H_real (px * m). Measure once with the actual vehicle.
      vehicle_dist_K: 180.0
      vehicle_dist_window_n: 5

    # ---- control ----
    control:
      target_speed: 0.35
      curvature_decel_factor: 0.6
      max_steer: 0.8
      max_speed: 0.5
